<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Servicios Financieros</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>💰 Gestor de Servicios Financieros</h1>
      <p class="subtitle">Administra cuentas, préstamos, inversiones y más</p>
      <div class="stats-summary" id="stats-summary">
        <span class="stat">Total: <strong id="stat-total">0</strong></span>
        <span class="stat">Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Inactivos: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Formulario -->
    <section class="task-form-section">
      <h2 id="form-title">➕ Nuevo Servicio Financiero</h2>
      <form id="item-form" class="task-form">
        <div class="form-group">
          <label for="item-name">Nombre</label>
          <input type="text" id="item-name" placeholder="Cuenta Ahorros Bancolombia, etc." required>
        </div>

        <div class="form-group">
          <label for="item-description">Descripción</label>
          <textarea id="item-description" rows="3" placeholder="Detalles adicionales"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="item-category">Categoría</label>
            <select id="item-category">
              <option value="bankaccount">🏦 Cuenta de banco</option>
              <option value="investment_and_savings">💱 Inversión y ahorro</option>
              <option value="transfers_payments">💵 Transferencias y pagos</option>
              <option value="loans">💰 Préstamos</option>
              <option value="other">📌 Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="item-priority">Nivel</label>
            <select id="item-priority">
              <option value="low">🟢 Baja</option>
              <option value="medium" selected>🟡 Media</option>
              <option value="high">🔴 Alta</option>
            </select>
          </div>
        </div>

        <!-- Campos adicionales -->
        <div class="form-group">
          <label for="item-amount">Monto (si aplica)</label>
          <input type="number" id="item-amount" step="0.01">
        </div>

        <div class="form-group">
          <label for="item-interestRate">Tasa de interés (%)</label>
          <input type="number" id="item-interestRate" step="0.1">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Crear</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Filtros -->
    <section class="filters-section">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-status">Estado:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="active">Activos</option>
            <option value="inactive">Inactivos</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Categoría:</label>
          <select id="filter-category">
            <option value="all">Todas</option>
              <option value="bankaccount">🏦 Cuenta de banco</option>
              <option value="investment_and_savings">💱 Inversión y ahorro</option>
              <option value="transfers_payments">💵 Transferencias y pagos</option>
              <option value="loans">💰 Préstamos</option>
              <option value="other">📌 Otro</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Nivel:</label>
          <select id="filter-priority">
            <option value="all">Todos</option>
            <option value="high">Alta</option>
            <option value="medium">Media</option>
            <option value="low">Baja</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar:</label>
          <input type="text" id="search-input" placeholder="Buscar servicios...">
        </div>
      </div>
    </section>

    <!-- Lista -->
    <section class="tasks-section">
      <div class="tasks-header">
        <h2>📋 Lista de Servicios Financieros</h2>
        <button class="btn btn-outline" id="clear-inactive">🗑️ Limpiar Inactivos</button>
      </div>
      <div id="item-list" class="task-list"></div>
      <div id="empty-state" class="empty-state">
        <p>📭 No hay servicios que mostrar</p>
        <p class="empty-state-hint">Crea tu primer servicio usando el formulario arriba</p>
      </div>
    </section>

    <!-- Estadísticas -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas Detalladas</h3>
      <div id="stats-details" class="stats-grid"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
